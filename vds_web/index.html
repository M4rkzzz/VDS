<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VDS Web Viewer</title>
  </head>
  <body>
    <div class="app-brand">VDS</div>
    <main id="app" class="app-shell">
      <section class="viewer-stage-panel">
        <div id="playerShell" class="player-shell">
          <div class="video-stack">
            <canvas id="dataChannelCanvas" aria-label="DataChannel encoded stream preview"></canvas>
            <p id="waitingMessage" class="waiting-message">等待分享者开始共享...</p>
          </div>
        </div>
      </section>

      <aside class="viewer-side">
        <header class="viewer-side-header">
          <p class="viewer-side-label">join</p>
          <h1>加入</h1>
          <p id="statusBadge" class="viewer-p2p-status">P2P：能力检测中</p>
        </header>

        <section id="joinCard" class="workspace-card join-card">
          <div class="join-tabs">
            <div class="segment-group" aria-label="加入方式">
              <button id="lobbyTabButton" class="segment-btn active" type="button">大厅</button>
              <button id="directTabButton" class="segment-btn" type="button">直连</button>
            </div>
            <button id="refreshRoomsButton" type="button" class="btn btn-small btn-secondary refresh-icon" aria-label="刷新公开房间列表" title="刷新公开房间列表">
              <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 12a8 8 0 1 1-2.34-5.66" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M20 4v6h-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>

          <div id="lobbyJoinPanel" class="join-mode-panel">
            <p id="roomListStatus" class="room-list-status">正在获取公开房间...</p>
            <div id="roomList" class="room-list"></div>
          </div>

          <div id="directJoinPanel" class="join-mode-panel hidden">
            <input id="roomIdInput" type="text" inputmode="text" autocomplete="off" maxlength="6" placeholder="输入房间号" />
            <button id="joinButton" type="button" class="btn btn-primary">加入</button>
          </div>
        </section>

        <section class="workspace-card status-panel">
          <p>房间号：<strong id="viewerRoomId">-</strong></p>
          <p>连接状态：<span id="statusText">正在检测浏览器能力。</span></p>
          <p>你在链中的位置：<span id="chainPositionText">-</span></p>
          <p>视频解码帧：<span id="decodedVideoText">0</span></p>
          <p>音频解码块：<span id="decodedAudioText">0</span></p>
          <p id="errorText" class="error-text"></p>
        </section>

        <section class="workspace-card diagnostics-panel">
          <div class="diagnostics-header">
            <span>P2P 诊断</span>
            <button id="copyDiagnosticsButton" type="button" class="btn btn-small btn-secondary">复制</button>
          </div>
          <textarea id="diagnosticsOutput" readonly></textarea>
        </section>

        <section class="workspace-card action-panel">
          <button id="leaveButton" type="button" class="btn btn-secondary hidden">返回</button>
          <button id="fullscreenButton" type="button" class="btn btn-secondary">全屏播放</button>
          <div class="audio-delay-control" aria-label="音频延迟">
            <span class="audio-delay-label">音频延迟</span>
            <div class="stepper">
              <button id="audioDelayDecrease" class="stepper-btn" type="button" aria-label="减少音频延迟">-</button>
              <input id="audioDelayInput" type="number" min="0" max="300" step="10" value="0" inputmode="numeric" />
              <span class="stepper-unit">ms</span>
              <button id="audioDelayIncrease" class="stepper-btn" type="button" aria-label="增加音频延迟">+</button>
            </div>
          </div>
          <div class="viewer-volume-control" aria-label="音量">
            <span class="audio-delay-label">音量</span>
            <div class="volume-row">
              <button id="muteButton" type="button" class="volume-icon-button" aria-label="静音" title="静音">
                <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M11 5 6 9H3v6h3l5 4V5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  <path d="M15.5 8.5a5 5 0 0 1 0 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </button>
              <input id="playerVolumeInput" class="player-volume-slider" type="range" min="0" max="100" step="1" value="100" aria-label="音量" />
            </div>
            <span id="playerVolumeValue" class="volume-value">100%</span>
          </div>
        </section>
      </aside>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
